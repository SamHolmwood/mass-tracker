<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Interactive Muscle Map</title>
  <style>
    /* Global Minimalist Styles */
    body {
      background-color: #0d0d0d;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 30px;
      text-transform: uppercase;
      font-size: 1.5rem;
    }

    /* Interactive Container Layout */
    .app-container {
      width: 100%;
      max-width: 512px;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    /* Dropdown Component Styling */
    .selector-container {
      width: 100%;
    }

    select {
      width: 100%;
      background-color: #1a1a1a;
      color: #ffffff;
      border: 1px solid #333333;
      padding: 12px 16px;
      font-size: 1rem;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      transition: border-color 0.2s ease;
    }

    select:focus {
      border-color: #00e5ff;
    }

    /* Vector Map Container Styles */
    .muscle-map-container {
      background-color: #000000;
      border-radius: 8px;
      border: 1px solid #222222;
      overflow: hidden;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Core Dynamic SVG Path Hover & Activation Mechanics */
    .muscle-group path {
      cursor: pointer;
      fill: transparent;
      stroke: #00e5ff;
      stroke-width: 1px;
      transition: fill 0.2s ease, stroke 0.2s ease, stroke-width 0.2s ease;
    }

    /* Highlight single structural paths inside targeted muscle clusters on hover */
    .muscle-group:hover path {
      fill: rgba(0, 229, 255, 0.25);
      stroke: #ffffff;
      stroke-width: 1.5px;
    }

    /* Active Highlight state tied instantly to the matching dropdown option */
    .muscle-group.is-active path {
      fill: rgba(0, 229, 255, 0.45);
      stroke: #ffffff;
      stroke-width: 1.5px;
    }
    
    /* Keep non-interactive target accents clean */
    .accent-paths path {
      pointer-events: none;
    }
  </style>
</head>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const dropdown = document.getElementById("exercise-dropdown");
      const muscleGroups = document.querySelectorAll(".muscle-group");

      // 1. EVENT: Vector Map Graphic Tap/Click Handler
      muscleGroups.forEach(group => {
        group.addEventListener("click", () => {
          const muscleValue = group.getAttribute("data-muscle");
          
          // Sync Dropdown List value selection
          if (dropdown) {
            dropdown.value = muscleValue;
            
            // Fire standard change event loop updates
            dropdown.dispatchEvent(new Event("change"));
          }
        });
      });

      // 2. EVENT: Dropdown Menu Manual Selection Change Handler
      if (dropdown) {
        dropdown.addEventListener("change", (e) => {
          const targetedMuscle = e.target.value;
          highlightMuscleGroup(targetedMuscle);
        });
      }

      // Visual Highlight State Controller Function
      function highlightMuscleGroup(muscleValue) {
        muscleGroups.forEach(group => {
          if (group.getAttribute("data-muscle") === muscleValue) {
            group.classList.add("is-active");
          } else {
            group.classList.remove("is-active");
          }
        });
      }
    });
  </script>
