<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mass Dynamic Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #060608; --bg-surface: #0e0e12; --bg-card: #15151f;
            --accent: #00e5ff; --text-main: #ffffff; --text-muted: #94a3b8;
            --border: #222235; --border-laser: #ff0055;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-main); color: var(--text-main); padding-bottom: 80px; }
        .page { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
        .page.active { display: block; }
        .card { background: var(--bg-surface); border: 1px solid var(--border); padding: 18px; margin-bottom: 20px; border-radius: 4px; }
        
        /* High-Fidelity Anatomy Engine */
        .muscle-map-container { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .muscle-map-pane { width: 49%; border: 1px solid var(--border); padding: 8px; background: #0b0b10; }
        .anatomy-viewport { width: 100%; height: 280px; }
        .body-silhouette { fill: #07070b; stroke: #262638; stroke-width: 1.5; }
        .muscle-node { fill: #1c1c28; stroke: #444466; stroke-width: 1.2; cursor: pointer; transition: 0.2s; }
        .muscle-node.selected { fill: rgba(0, 229, 255, 0.6); stroke: #ffffff; filter: drop-shadow(0 0 8px var(--accent)); }

        /* Controls */
        input, select { width: 100%; background: var(--bg-card); border: 1px solid var(--border); color: #fff; padding: 12px; margin-top: 8px; border-radius: 4px; }
        button.primary-btn { width: 100%; background: #000; color: var(--accent); border: 1px solid var(--accent); padding: 14px; margin-top: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: #0e0e12; border-top: 2px solid var(--border); display: flex; }
        .nav-btn { flex: 1; padding: 20px; background: none; border: none; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .nav-btn.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="tracker" class="page active">
        <div class="card">
            <div class="muscle-map-container">
                <div class="muscle-map-pane">
                    <span>Anterior Matrix</span>
                    <svg class="anatomy-viewport" viewBox="0 0 100 240">
                        <path class="body-silhouette" d="M50,8 C43,8 39,13 39,22 C39,28 43,32 45,35 L42,41 L27,43 C16,46 12,56 8,72 L2,112 C1,120 7,124 13,121 L19,98 L18,135 L19,182 L11,236 L34,236 L46,182 L50,148 L54,182 L66,236 L89,236 L81,182 L82,135 L81,98 L87,121 C93,124 99,120 98,112 L92,72 C88,56 84,46 73,43 L58,41 L55,35 C57,32 61,28 61,22 C61,13 57,8 50,8 Z" />
                        <path class="muscle-node" data-muscle="shoulders" d="M38,36 C34,38 29,43 27,49 C25,55 24,63 26,70 L32,64 C33,54 35,46 38,36 Z" />
                        <path class="muscle-node" data-muscle="shoulders" d="M62,36 C66,38 71,43 73,49 C75,55 76,63 74,70 L68,64 C67,54 65,46 62,36 Z" />
                        <path class="muscle-node" data-muscle="chest" d="M28,48 C35,46 45,49 49,56 C46,68 36,71 27,67 C25,60 26,53 28,48 Z" />
                        <path class="muscle-node" data-muscle="chest" d="M72,48 C65,46 55,49 51,56 C54,68 64,71 73,67 C75,60 74,53 72,48 Z" />
                        <path class="muscle-node" data-muscle="abs" d="M37,74 L49,74 L49,84 L37,84 Z" /><path class="muscle-node" data-muscle="abs" d="M51,74 L63,74 L63,84 L51,84 Z" />
                        <path class="muscle-node" data-muscle="abs" d="M38,86 L49,86 L49,96 L38,96 Z" /><path class="muscle-node" data-muscle="abs" d="M51,86 L62,86 L62,96 L51,96 Z" />
                        <path class="muscle-node" data-muscle="abs" d="M39,98 L49,98 L49,108 L39,108 Z" /><path class="muscle-node" data-muscle="abs" d="M51,98 L61,98 L61,108 L51,108 Z" />
                        <path class="muscle-node" data-muscle="abs" d="M40,110 L49,110 L49,122 L40,122 Z" /><path class="muscle-node" data-muscle="abs" d="M51,110 L60,110 L60,122 L51,122 Z" />
                    </svg>
                </div>
                <div class="muscle-map-pane">
                    <span>Posterior Matrix</span>
                    <svg class="anatomy-viewport" viewBox="0 0 100 240">
                        <path class="body-silhouette" d="M50,8 C43,8 39,13 39,22 C39,28 43,32 45,35 L42,41 L27,43 C16,46 12,56 8,72 L2,112 C1,120 7,124 13,121 L19,98 L18,135 L19,182 L11,236 L34,236 L46,182 L50,148 L54,182 L66,236 L89,236 L81,182 L82,135 L81,98 L87,121 C93,124 99,120 98,112 L92,72 C88,56 84,46 73,43 L58,41 L55,35 C57,32 61,28 61,22 C61,13 57,8 50,8 Z" />
                        <path class="muscle-node" data-muscle="back" d="M22,50 C36,52 47,59 48,94 C34,90 19,76 22,50 Z" />
                        <path class="muscle-node" data-muscle="back" d="M78,50 C64,52 53,59 52,94 C66,90 81,76 78,50 Z" />
                        <path class="muscle-node" data-muscle="legs" d="M21,124 C34,119 48,123 49,142 C34,145 20,138 21,124 Z" />
                        <path class="muscle-node" data-muscle="legs" d="M79,124 C66,119 52,123 51,142 C66,145 80,138 79,124 Z" />
                    </svg>
                </div>
            </div>
            <input type="number" id="weight" placeholder="Mass Load (kg)">
            <button class="primary-btn" onclick="logData()">Execute Log</button>
        </div>
    </div>

    <div id="meals" class="page">
        <div class="card">
            <h2>Nutrition Pipeline</h2>
            <p id="mealOutput">Select a day to view surplus manifest.</p>
        </div>
    </div>

    <nav>
        <button class="nav-btn active" onclick="switchPage('tracker', this)">Tracker</button>
        <button class="nav-btn" onclick="switchPage('meals', this)">Nutrition</button>
    </nav>

    <script>
        function switchPage(p, b) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            b.classList.add('active');
        }
        document.querySelectorAll('.muscle-node').forEach(el => {
            el.addEventListener('click', function() {
                document.querySelectorAll('.muscle-node').forEach(m => m.classList.remove('selected'));
                document.querySelectorAll(`[data-muscle="${this.dataset.muscle}"]`).forEach(m => m.classList.add('selected'));
            });
        });
        function logData() { alert("Telemetry synchronized."); }
    </script>
</body>
</html>
