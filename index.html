<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mass Dynamic Pro — Anatomy Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-darken: #050507;
            --bg-workspace: #0b0c10;
            --bg-panels: #111217;
            --border-subtle: #1f2029;
            
            /* MuscleWiki Interaction Colors */
            --mw-body-base: #1c1d24;
            --mw-stroke-line: #2a2b35;
            --mw-muscle-idle: #23242e;
            --mw-hover-neon: #38bdf8;
            --mw-select-neon: #f43f5e;
            
            --text-bright: #f8fafc;
            --text-darken: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-darken);
            color: var(--text-bright);
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        header {
            background-color: var(--bg-panels);
            padding: 18px;
            text-align: center;
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-bright);
        }

        .page {
            display: none;
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
        }

        .page.active { display: block; }

        .mw-interface-card {
            background-color: var(--bg-panels);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .mw-gender-tabs {
            display: flex;
            background: var(--bg-workspace);
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-subtle);
        }

        .mw-tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-darken);
            padding: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .mw-tab-btn.active {
            background: var(--border-subtle);
            color: var(--text-bright);
        }

        .mw-map-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: var(--bg-workspace);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 14px 8px;
            margin-bottom: 20px;
        }

        .mw-map-pane {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mw-map-pane span {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-darken);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .mw-viewport {
            width: 100%;
            height: 380px;
        }

        .mw-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
        }

        .mw-silhouette {
            fill: var(--mw-body-base);
            stroke: var(--mw-stroke-line);
            stroke-width: 1.2;
        }

        .mw-muscle {
            fill: var(--mw-muscle-idle);
            stroke: var(--mw-stroke-line);
            stroke-width: 0.8;
            cursor: pointer;
            transition: fill 0.1s ease-out, stroke 0.1s ease-out;
        }

        .mw-muscle:hover {
            fill: var(--mw-hover-neon) !important;
            stroke: #ffffff;
            stroke-width: 1.2;
        }

        .mw-muscle.selected {
            fill: var(--mw-select-neon) !important;
            stroke: #ffffff;
            stroke-width: 1.5;
            filter: drop-shadow(0 0 8px rgba(244, 63, 94, 0.6));
        }

        .mw-hud-banner {
            display: none;
            background: rgba(56, 189, 248, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .mw-hud-banner strong { color: var(--mw-hover-neon); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        .mw-clear-btn { background: #1e2029; border: 1px solid #2e303d; color: var(--text-bright); font-size: 0.65rem; font-weight: 700; padding: 6px 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase;}

        h2 { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; color: var(--text-bright); }
        .input-group { margin-bottom: 14px; }
        label { display: block; font-size: 0.68rem; font-weight: 700; color: var(--text-darken); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { width: 100%; background-color: var(--bg-workspace); border: 1px solid var(--border-subtle); color: var(--text-bright); padding: 12px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; transition: border 0.2s; }
        input:focus, select:focus { border-color: var(--mw-hover-neon); outline: none; }
        .row { display: flex; gap: 10px; }

        button.action-submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%); color: #050507; border: none; padding: 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
            cursor: pointer; margin-top: 6px; transition: opacity 0.2s;
        }
        button.action-submit-btn:active { opacity: 0.85; }

        .log-entry-row { border-bottom: 1px solid var(--border-subtle); padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .log-entry-row h4 { font-size: 0.85rem; font-weight: 600; color: var(--text-bright); }
        .log-entry-row p { font-size: 0.7rem; color: var(--text-darken); margin-top: 2px; }
        .log-badge-spec { background-color: var(--bg-workspace); padding: 6px 12px; border: 1px solid var(--border-subtle); border-radius: 6px; color: var(--mw-hover-neon); font-weight: 700; font-size: 0.78rem; }
        .chart-module-wrap { width: 100%; background-color: var(--bg-workspace); padding: 10px; border: 1px solid var(--border-subtle); border-radius: 8px; }

        .accordion-block { border: 1px solid var(--border-subtle); border-radius: 8px; margin-bottom: 10px; background-color: var(--bg-panels); overflow: hidden; }
        .accordion-header-bar { padding: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .accordion-body-content { display: none; padding: 14px; border-top: 1px solid var(--border-subtle); background-color: var(--bg-workspace); }
        .diet-items-list { list-style: none; margin: 4px 0 12px 0; }
        .diet-items-list li { font-size: 0.8rem; color: #e2e8f0; margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
        .diet-items-list li::before { content: "•"; color: var(--mw-hover-neon); }

        nav { position: fixed; bottom: 0; left: 0; right: 0; background-color: rgba(17, 18, 23, 0.96); backdrop-filter: blur(16px); border-top: 1px solid var(--border-subtle); display: flex; height: 68px; z-index: 100; }
        .nav-link-item { flex: 1; background: none; border: none; color: var(--text-darken); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; gap: 4px; }
        .nav-link-item.active { color: var(--mw-hover-neon); }
        .nav-link-item svg { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>

    <header>
        <h1>MASS DYNAMIC PRO</h1>
    </header>

    <div id="tracker" class="page active">
        <div class="mw-interface-card">
            
            <div class="mw-gender-tabs">
                <button class="mw-tab-btn active" id="tabMale" onclick="toggleGenderSystem('male')">Male Framework</button>
                <button class="mw-tab-btn" id="tabFemale" onclick="toggleGenderSystem('female')">Female Framework</button>
            </div>
            
            <div class="mw-map-grid">
                <div class="mw-map-pane">
                    <span>Anterior</span>
                    <div class="mw-viewport">
                        <svg class="mw-svg" viewBox="0 0 100 220">
                            <path class="mw-muscle" data-muscle="chest" d="M50,43 C42,43 35,46 31,52 C35,62 45,64 50,65 Z" />
                            <path class="mw-muscle" data-muscle="chest" d="M50,43 C58,43 65,46 69,52 C65,62 55,64 50,65 Z" />
                            
                            <path class="mw-muscle" data-muscle="abs" d="M35,68 L65,68 L62,110 L38,110 Z" />
                            
                            <path class="mw-muscle" data-muscle="shoulders" d="M30,47 C24,47 21,55 20,62 C23,65 28,60 31,51 Z" />
                            <path class="mw-muscle" data-muscle="shoulders" d="M70,47 C76,47 79,55 80,62 C77,65 72,60 69,51 Z" />
                            
                            <path class="mw-muscle" data-muscle="arms" d="M19,65 C16,75 16,90 19,102 C21,102 23,92 22,75 Z" />
                            <path class="mw-muscle" data-muscle="arms" d="M81,65 C84,75 84,90 81,102 C79,102 77,92 78,75 Z" />
                            
                            <path class="mw-muscle" data-muscle="legs" d="M32,114 C38,114 48,116 48,148 L31,148 C28,135 29,122 32,114 Z" />
                            <path class="mw-muscle" data-muscle="legs" d="M68,114 C62,114 52,116 52,148 L69,148 C72,135 71,122 68,114 Z" />
                        </svg>
                    </div>
                </div>

                <div class="mw-map-pane">
                    <span>Posterior</span>
                    <div class="mw-viewport">
                        <svg class="mw-svg" viewBox="0 0 100 220">
                            <path class="mw-muscle" data-muscle="back" d="M34,44 L66,44 L60,65 L40,65 Z" />
                            <path class="mw-muscle" data-muscle="back" d="M36,67 L64,67 L61,104 L39,104 Z" />
                            
                            <path class="mw-muscle" data-muscle="shoulders" d="M32,46 C26,46 22,52 21,60 C24,61 29,56 32,48 Z" />
                            <path class="mw-muscle" data-muscle="shoulders" d="M68,46 C74,46 78,52 79,60 C76,61 71,56 68,48 Z" />
                            
                            <path class="mw-muscle" data-muscle="arms" d="M20,62 C17,72 17,85 19,98 C21,98 22,88 22,72 Z" />
                            <path class="mw-muscle" data-muscle="arms" d="M80,62 C83,72 83,85 81,98 C79,98 78,88 78,72 Z" />
                            
                            <path class="mw-muscle" data-muscle="legs" d="M30,108 C40,106 50,106 50,123 C38,125 30,121 30,108 Z" />
                            <path class="mw-muscle" data-muscle="legs" d="M70,108 C60,106 50,106 50,123 C62,125 70,121 70,108 Z" />
                            
                            <path class="mw-muscle" data-muscle="legs" d="M31,128 L48,128 L45,182 L30,182 Z" />
                            <path class="mw-muscle" data-muscle="legs" d="M69,128 L52,128 L55,182 L70,182 Z" />
                        </svg>
                    </div>
                </div>
            </div>

            <div id="filterBanner" class="mw-hud-banner">
                <span>TARGET ISOLATION: <strong id="filterLabel">NONE</strong></span>
                <button class="mw-clear-btn" onclick="clearActiveSystemFilters()">Clear Focus</button>
            </div>

            <h2>Log Exercise Metrics</h2>
            <div class="input-group">
                <label>Selected Movement Profile Identity</label>
                <select id="exercise"></select>
            </div>
            <div class="row">
                <div class="input-group" style="flex: 1;">
                    <label>Absolute Load (kg)</label>
                    <input type="number" id="weight" placeholder="0.0" step="2.5">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Terminal Reps</label>
                    <input type="number" id="reps" placeholder="0">
                </div>
            </div>
            <button class="action-submit-btn" onclick="commitPerformanceLog()">Commit Set To Storage</button>
        </div>

        <div class="mw-interface-card">
            <h2>Volumetric Telemetry Stream</h2>
            <div class="input-group" style="margin-bottom: 14px;">
                <label>Filter Analytics Target Stream</label>
                <select id="chartFilter" onchange="refreshTelemetryChart()"></select>
            </div>
            <div class="chart-module-wrap">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>

        <div class="mw-interface-card">
            <h2>Performance History Matrix</h2>
            <div id="logHistory"></div>
            <button onclick="wipeLocalStorageData()" style="background: none; color: var(--mw-select-neon); border: 1px dashed rgba(244,63,94,0.3); margin-top: 16px; padding: 12px; font-size: 0.72rem; border-radius: 6px; font-weight:700; width:100%; cursor:pointer; text-transform: uppercase;">Wipe Engine Storage</button>
        </div>
    </div>

    <div id="meals" class="page">
        <div class="mw-interface-card" style="border-left: 4px solid var(--mw-select-neon);">
            <h2>Hypertrophic Fuel Matrix</h2>
            <p style="font-size: 1.7rem; font-weight: 900; color: var(--text-bright); letter-spacing: -0.5px;">3,100 KCAL</p>
            <p style="font-size: 0.75rem; color: var(--text-darken); font-weight:700; margin-top: 2px; letter-spacing: 0.5px;">PRO: 175G // CARBS: 420G // FATS: 80G</p>
        </div>
        <div class="mw-interface-card">
            <label style="margin-bottom: 8px;">Pipeline Micro-Rotation Segment Focus</label>
            <select id="daySelect" onchange="buildNutritionPlanManifest()">
                <option value="1">Rotation Pipeline Alpha (Monday)</option>
                <option value="2">Rotation Pipeline Beta (Tuesday)</option>
                <option value="3">Rotation Pipeline Gamma (Wednesday)</option>
                <option value="4">Rotation Pipeline Delta (Thursday)</option>
                <option value="5">Rotation Pipeline Epsilon (Friday)</option>
                <option value="6">Rotation Pipeline Zeta (Saturday)</option>
                <option value="7">Rotation Pipeline Eta (Sunday)</option>
            </select>
        </div>
        <h2 id="menuDayTitle" style="margin-bottom: 12px; padding-left: 4px;">Menu Manifest</h2>
        <div id="dynamicMenuContainer"></div>
    </div>

    <nav>
        <button class="nav-link-item active" onclick="navigateActiveViewport('tracker', this)">
            <svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43l-2.86-2.86L17.71 12l2.86 2.86M4.29 12l1.43-1.43L2.86 7.71 1.43 9.14 4.29 12m11.14-5.14L14 8.29l2.86 2.86 1.43-1.43-2.86-2.86M8.29 14l1.43 1.43 2.86-2.86-1.43-1.43L8.29 14M9.71 5.43L11.14 4 8.29 1.14 6.86 2.57l2.85 2.86M14.29 20l-1.43-1.43-2.86 2.86 1.43 1.43 2.86-2.86M22 2v4h-4V2h4zM6 18v4H2v-4h4z"/></svg>
            <span>Telemetry</span>
        </button>
        <button class="nav-link-item" onclick="navigateActiveViewport('meals', this)">
            <svg viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7m8-3h-3v14h-2.5V6h-3V2h8.5v4z"/></svg>
            <span>Nutrition</span>
        </button>
    </nav>

    <script>
        let telemetryChartInstance = null;
        let globalSelectedMuscleNode = null;
        let internalGenderMetricsSystem = 'male';

        const dynamicExerciseMatrixMap = {
            chest: ["Flat Bench Press", "Incline Dumbbell Press", "Cable Chest Fly", "Pec Deck Machine"],
            back: ["Deadlift", "Romanian Deadlift (RDL)", "Barbell Row", "Lat Pulldown", "Seated Cable Row"],
            shoulders: ["Overhead Dumbbell Press", "Machine Shoulder Press", "Cable Lateral Raise", "Dumbbell Lateral Raise"],
            abs: ["Weighted Hanging Leg Raise", "Cable Crunch", "Ab-Wheel Rollout"],
            legs: ["Barbell Back Squat", "Leg Extension Machine", "Seated Hamstring Curl", "Lying Leg Curl Machine"],
            arms: ["Tricep Rope Pushdown", "Cable Bicep Curl", "Preacher Curl Machine"]
        };

        const recipes = {
            hash: { title: "Savory Potato & Egg Hash", macros: "730 kcal | 28g P | 95g C | 24g F", ingredients: ["300g White Potatoes", "2 Whole Eggs", "100g Egg Whites"], steps: ["Air fry potatoes.", "Scramble eggs."] },
            oats: { title: "Mass Power Overnight Berry Oats", macros: "760 kcal | 35g P | 110g C | 16g F", ingredients: ["100g Rolled Oats", "30g Whey"], steps: ["Mix items.", "Refrigerate."] },
            breakfastWrap: { title: "Ultimate Breakfast Wrap Duo", macros: "780 kcal | 30g P | 90g C | 28g F", ingredients: ["2 Tortilla Wraps", "3 Eggs"], steps: ["Scramble eggs.", "Wrap items."] },
            steakPasta: { title: "Creamy Garlic Steak Pasta", macros: "860 kcal | 58g P | 105g C | 22g F", ingredients: ["120g Steak Strips", "100g Pasta"], steps: ["Boil pasta.", "Sear steak."] },
            cajunWrap: { title: "Spicy Cajun Chicken Wrap Duo", macros: "820 kcal | 52g P | 98g C | 18g F", ingredients: ["150g Chicken", "2 Wraps"], steps: ["Cook chicken.", "Assemble wraps."] },
            beefSweetPotato: { title: "Sweet Potato & Beef Taco Skillet", macros: "840 kcal | 48g P | 102g C | 24g F", ingredients: ["140g Ground Beef", "350g Sweet Potatoes"], steps: ["Brown beef.", "Simmer potato."] },
            soyGarlicBowl: { title: "Soy-Garlic Chicken Rice Bowl", macros: "790 kcal | 54g P | 100g C | 14g F", ingredients: ["160g Chicken", "110g Jasmine Rice"], steps: ["Cook rice.", "Sauté chicken."] },
            honeySalmon: { title: "Honey-Soy Salmon & Sesame Rice", macros: "830 kcal | 46g P | 104g C | 23g F", ingredients: ["150g Salmon Fillet", "110g Basmati Rice"], steps: ["Cook rice.", "Pan-sear salmon."] },
            bbqPotato: { title: "BBQ Chicken & Roasted Potatoes", macros: "810 kcal | 50g P | 101g C | 15g F", ingredients: ["160g Chicken", "350g Potatoes"], steps: ["Roast potatoes.", "Glaze chicken."] },
            turkeyChili: { title: "Hearty Turkey & Bean Chili", macros: "790 kcal | 52g P | 98g C | 16g F", ingredients: ["150g Ground Turkey", "120g Kidney Beans"], steps: ["Brown turkey.", "Simmer beans."] },
            beefRiceWrap: { title: "Loaded Beef & Rice Monster Burrito", macros: "850 kcal | 46g P | 108g C | 22g F", ingredients: ["120g Ground Beef", "70g Rice"], steps: ["Brown beef.", "Assemble burrito."] },
            snackA: { title: "Protein Refuel Wrap", macros: "560 kcal | 26g P | 72g C | 12g F", ingredients: ["1 Tortilla", "20g Peanut Butter"], steps: ["Spread PB.", "Roll wrap."] },
            snackB: { title: "Quick Savory Egg & Rice Mash", macros: "540 kcal | 24g P | 70g C | 14g F", ingredients: ["80g White Rice", "2 Eggs"], steps: ["Fry eggs.", "Mash with rice."] },
            snackC: { title: "Honey Peanut Butter Rice Cakes", macros: "510 kcal | 20g P | 74g C | 13g F", ingredients: ["4 Rice Cakes", "25g Peanut Butter"], steps: ["Spread PB.", "Drizzle honey."] }
        };

        const mealRotationPipelines = {
            "1": [ {tag: "Meal 1", ref: "hash"}, {tag: "Meal 2", ref: "cajunWrap"}, {tag: "Meal 3", ref: "snackA"}, {tag: "Meal 4", ref: "soyGarlicBowl"} ],
            "2": [ {tag: "Meal 1", ref: "oats"}, {tag: "Meal 2", ref: "steakPasta"}, {tag: "Meal 3", ref: "snackB"}, {tag: "Meal 4", ref: "bbqPotato"} ],
            "3": [ {tag: "Meal 1", ref: "breakfastWrap"}, {tag: "Meal 2", ref: "beefSweetPotato"}, {tag: "Meal 3", ref: "snackC"}, {tag: "Meal 4", ref: "honeySalmon"} ],
            "4": [ {tag: "Meal 1", ref: "oats"}, {tag: "Meal 2", ref: "cajunWrap"}, {tag: "Meal 3", ref: "snackA"}, {tag: "Meal 4", ref: "turkeyChili"} ],
            "5": [ {tag: "Meal 1", ref: "hash"}, {tag: "Meal 2", ref: "steakPasta"}, {tag: "Meal 3", ref: "snackC"}, {tag: "Meal 4", ref: "beefRiceWrap"} ],
            "6": [ {tag: "Meal 1", ref: "breakfastWrap"}, {tag: "Meal 2", ref: "honeySalmon"}, {tag: "Meal 3", ref: "snackB"}, {tag: "Meal 4", ref: "soyGarlicBowl"} ],
            "7": [ {tag: "Meal 1", ref: "oats"}, {tag: "Meal 2", ref: "beefSweetPotato"}, {tag: "Meal 3", ref: "snackA"}, {tag: "Meal 4", ref: "turkeyChili"} ]
        };

        function toggleGenderSystem(genderToken) {
            internalGenderMetricsSystem = genderToken;
            document.getElementById('tabMale').classList.toggle('active', genderToken === 'male');
            document.getElementById('tabFemale').classList.toggle('active', genderToken === 'female');
        }

        function buildInteractiveNodeListeners() {
            document.querySelectorAll('.mw-muscle').forEach(nodeElement => {
                nodeElement.addEventListener('click', function() {
                    const groupKey = this.getAttribute('data-muscle');
                    
                    document.querySelectorAll('.mw-muscle').forEach(m => m.classList.remove('selected'));
                    document.querySelectorAll(`.mw-muscle[data-muscle="${groupKey}"]`).forEach(m => m.classList.add('selected'));
                    
                    globalSelectedMuscleNode = groupKey;
                    refreshMovementSelectionOptions();
                    
                    document.getElementById('filterLabel').textContent = groupKey;
                    document.getElementById('filterBanner').style.display = 'flex';
                });
            });
        }

        function refreshMovementSelectionOptions() {
            const exerciseSelect = document.getElementById('exercise');
            exerciseSelect.innerHTML = '';

            if (globalSelectedMuscleNode && dynamicExerciseMatrixMap[globalSelectedMuscleNode]) {
                dynamicExerciseMatrixMap[globalSelectedMuscleNode].forEach(movement => {
                    exerciseSelect.innerHTML += `<option value="${movement}">${movement}</option>`;
                });
            } else {
                Object.keys(dynamicExerciseMatrixMap).forEach(category => {
                    let groupHTML = `<optgroup label="${category.toUpperCase()}">`;
                    dynamicExerciseMatrixMap[category].forEach(ex => { groupHTML += `<option value="${ex}">${ex}</option>`; });
                    groupHTML += `</optgroup>`;
                    exerciseSelect.innerHTML += groupHTML;
                });
            }
        }

        function clearActiveSystemFilters() {
            globalSelectedMuscleNode = null;
            document.querySelectorAll('.mw-muscle').forEach(m => m.classList.remove('selected'));
            document.getElementById('filterBanner').style.display = 'none';
            refreshMovementSelectionOptions();
        }

        function navigateActiveViewport(targetPageKey, executionSourceButton) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link-item').forEach(b => b.classList.remove('active'));
            document.getElementById(targetPageKey).classList.add('active');
            executionSourceButton.classList.add('active');
            if (targetPageKey === 'tracker') { refreshTelemetryChart(); }
        }

        function buildNutritionPlanManifest() {
            const activeRotationIndex = document.getElementById('daySelect').value;
            const menuRenderContainer = document.getElementById('dynamicMenuContainer');
            if (!menuRenderContainer) return;
            
            const calendarDaysArray = ["", "Monday Plan", "Tuesday Plan", "Wednesday Plan", "Thursday Plan", "Friday Plan", "Saturday Plan", "Sunday Plan"];
            document.getElementById('menuDayTitle').textContent = `${calendarDaysArray[parseInt(activeRotationIndex)]}`;

            menuRenderContainer.innerHTML = mealRotationPipelines[activeRotationIndex].map(mealItem => {
                const targetRecipeDetails = recipes[mealItem.ref];
                const listIngredientsHtmlString = targetRecipeDetails.ingredients.map(ing => `<li>${ing}</li>`).join('');
                const listStepsHtmlString = targetRecipeDetails.steps.map(step => `<li>${step}</li>`).join('');
                return `
                    <div class="accordion-block">
                        <div class="accordion-header-bar" onclick="toggleAccordionDisplayPanel(this)">
                            <div>
                                <span style="font-size:0.6rem; font-weight:900; color:var(--mw-select-neon); text-transform:uppercase; display:block; margin-bottom:2px;">${mealItem.tag}</span>
                                <h3 style="font-size:0.85rem; font-weight: 700;">${targetRecipeDetails.title}</h3>
                            </div>
                            <span style="color:var(--mw-hover-neon); font-size:0.65rem;">▼</span>
                        </div>
                        <div class="accordion-body-content">
                            <p style="font-weight:700; color:var(--mw-hover-neon); font-size:0.8rem; margin-bottom:10px;">${targetRecipeDetails.macros}</p>
                            <p style="font-size:0.65rem; text-transform:uppercase; font-weight:800; color:var(--text-darken); margin-bottom:4px;">Ingredients Base:</p>
                            <ul class="diet-items-list">${listIngredientsHtmlString}</ul>
                            <p style="font-size:0.65rem; text-transform:uppercase; font-weight:800; color:var(--text-darken); margin-top:4px; margin-bottom:4px;">Instructions Workflow:</p>
                            <ol style="padding-left:12px; color:#cbd5e1; font-size:0.8rem;">${listStepsHtmlString}</ol>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleAccordionDisplayPanel(headerBarTarget) {
            const actualContentContainerNode = headerBarTarget.nextElementSibling;
            const arrowIndicatorNode = headerBarTarget.querySelector('span:last-child');
            if (actualContentContainerNode.style.display === 'block') {
                actualContentContainerNode.style.display = 'none';
                arrowIndicatorNode.textContent = '▼';
            } else {
                actualContentContainerNode.style.display = 'block';
                arrowIndicatorNode.textContent = '▲';
            }
        }

        function commitPerformanceLog() {
            const movementName = document.getElementById('exercise').value;
            const activeWeightValue = parseFloat(document.getElementById('weight').value);
            const absoluteRepsValue = parseInt(document.getElementById('reps').value);
            if(!activeWeightValue || !absoluteRepsValue || !movementName) return alert("System requires full parameters to establish logs.");

            const customTimestampString = new Date().toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
            let localizedDataLogsArray = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            localizedDataLogsArray.unshift({ exercise: movementName, weight: activeWeightValue, reps: absoluteRepsValue, timestamp: customTimestampString });
            localStorage.setItem('workoutLogs', JSON.stringify(localizedDataLogsArray));

            document.getElementById('weight').value = '';
            document.getElementById('reps').value = '';
            renderHistoricalLogsEngine(); buildChartOptionsFilters(); refreshTelemetryChart();
        }

        function renderHistoricalLogsEngine() {
            const historyMountContainer = document.getElementById('logHistory');
            let localizedDataLogsArray = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            if(localizedDataLogsArray.length === 0) {
                historyMountContainer.innerHTML = `<p style="color:var(--text-darken); font-size:0.75rem; text-align:center; padding: 12px 0;">No diagnostic matrices found in runtime storage.</p>`;
                return;
            }
            historyMountContainer.innerHTML = localizedDataLogsArray.map(entryItem => `
                <div class="log-entry-row">
                    <div class="log-info-block"><h4>${entryItem.exercise}</h4><p>${entryItem.timestamp}</p></div>
                    <div class="log-badge-spec">${entryItem.weight}kg × ${entryItem.reps}</div>
                </div>
            `).join('');
        }

        function buildChartOptionsFilters() {
            const telemetryFilterSelectNode = document.getElementById('chartFilter');
            const localizedDataLogsArray = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            const targetedExercisesLoggedSet = [...new Set(localizedDataLogsArray.map(log => log.exercise))];
            if(targetedExercisesLoggedSet.length === 0) { telemetryFilterSelectNode.innerHTML = `<option value="">Awaiting system data stream...</option>`; return; }
            telemetryFilterSelectNode.innerHTML = targetedExercisesLoggedSet.map(exKey => `<option value="${exKey}">${exKey}</option>`).join('');
        }

        function compileCoreLineChartEngine() {
            const chartContextNode = document.getElementById('analyticsChart').getContext('2d');
            telemetryChartInstance = new Chart(chartContextNode, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#22d3ee', borderWidth: 2, tension: 0.15, fill: false }] },
                options: { 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        x: { grid: { color: '#1f2029' }, ticks: { color: '#64748b', font: { family: 'Inter', size: 10 } } }, 
                        y: { grid: { color: '#1f2029' }, ticks: { color: '#64748b', font: { family: 'Inter', size: 10 } } } 
                    } 
                }
            });
        }

        function refreshTelemetryChart() {
            if(!telemetryChartInstance) return;
            const targetMovementSelectionFilter = document.getElementById('chartFilter').value;
            let localizedDataLogsArray = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            let sortedFilteredLogMatches = localizedDataLogsArray.filter(log => log.exercise === targetMovementSelectionFilter).reverse();
            telemetryChartInstance.data.labels = sortedFilteredLogMatches.map(log => log.timestamp);
            telemetryChartInstance.data.datasets[0].data = sortedFilteredLogMatches.map(log => Math.round(log.weight * (1 + log.reps / 30)));
            telemetryChartInstance.update();
        }

        function wipeLocalStorageData() { if(confirm("Purge tracking records permanently?")) { localStorage.removeItem('workoutLogs'); renderHistoricalLogsEngine(); buildChartOptionsFilters(); refreshTelemetryChart(); } }

        window.onload = function() {
            buildInteractiveNodeListeners();
            refreshMovementSelectionOptions(); renderHistoricalLogsEngine(); compileCoreLineChartEngine(); buildChartOptionsFilters(); refreshTelemetryChart(); buildNutritionPlanManifest();
        };
    </script>
</body>
</html>
