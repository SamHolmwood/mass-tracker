<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mass Dynamic Pro</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #060608;
            --bg-surface: #0e0e12;
            --bg-card: #15151f;
            --accent: #00e5ff;
            --accent-dim: #008ba3;
            --accent-glow: rgba(0, 229, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border: #222235;
            --border-laser: #ff0055;
            --grid-color: rgba(0, 229, 255, 0.025);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 24px 24px, 24px 24px;
            color: var(--text-main);
            padding-bottom: 95px;
            overflow-x: hidden;
            letter-spacing: -0.2px;
        }

        header {
            background: linear-gradient(180deg, var(--bg-surface) 0%, rgba(14,14,18,0.9) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent-dim);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.05rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 12px var(--accent);
        }

        h2 { 
            font-size: 0.9rem; 
            font-weight: 900; 
            letter-spacing: 1.5px;
            margin-bottom: 16px; 
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            background-color: var(--border-laser);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--border-laser);
        }

        .page {
            display: none;
            padding: 20px 16px;
            max-width: 480px;
            margin: 0 auto;
            animation: terminalBoot 0.15s ease-out;
        }

        .page.active { display: block; }

        @keyframes terminalBoot {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
        }

        /* PREMIUM HYPER-REALISTIC MESH MAP INTEGRATION */
        .muscle-map-container {
            display: flex;
            justify-content: space-between;
            background-color: #0b0b10;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .muscle-map-pane {
            width: 49%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.02) 1px, transparent 1px);
            background-size: 14px 14px;
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: 4px;
            padding: 8px 4px;
            overflow: hidden;
        }

        .muscle-map-pane span {
            font-size: 0.65rem;
            font-weight: 900;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            text-transform: uppercase;
            z-index: 10;
        }

        .anatomy-viewport {
            width: 100%;
            height: 340px;
            position: relative;
        }

        /* Hyper-Realistic Base Models Render Layer */
        .anatomy-img-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            mix-blend-mode: lighten;
            filter: brightness(0.9) contrast(1.1);
            z-index: 1;
        }

        /* High-Accuracy SVG Interface Mask Layer */
        .anatomy-svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .muscle-node {
            fill: rgba(0, 229, 255, 0);
            stroke: rgba(0, 229, 255, 0);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .muscle-node:hover {
            fill: rgba(0, 229, 255, 0.15);
            stroke: rgba(0, 229, 255, 0.4);
            stroke-width: 0.5;
        }

        .muscle-node.selected {
            fill: rgba(0, 229, 255, 0.45);
            stroke: var(--accent);
            stroke-width: 1.5;
            filter: drop-shadow(0 0 14px rgba(0, 229, 255, 0.8));
        }

        .filter-status-banner {
            display: none;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--accent);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 18px;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
        }

        .filter-status-banner strong {
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .clear-filter-btn {
            background: none;
            border: 1px solid var(--border-laser);
            color: var(--border-laser);
            font-size: 0.65rem;
            font-weight: 900;
            padding: 6px 10px;
            border-radius: 3px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .input-group { margin-bottom: 14px; }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        
        input, select {
            width: 100%;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
        }
        
        input:focus, select:focus {
            border-color: var(--accent);
            outline: none;
        }

        .row { display: flex; gap: 12px; }

        button.primary-btn {
            width: 100%;
            background: #000;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 14px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            margin-top: 6px;
        }
        button.primary-btn:active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .metrics-banner { border-left: 3px solid var(--border-laser) !important; }
        
        .log-item {
            border-bottom: 1px solid var(--border);
            padding: 14px 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-info-block h4 { font-size: 0.9rem; font-weight: 700; }
        .log-info-block p { font-size: 0.75rem; color: var(--text-muted); }
        .log-value-badge {
            background-color: var(--bg-card);
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--accent);
            font-weight: 700;
        }

        .chart-container {
            position: relative;
            width: 100%;
            margin-top: 8px;
            background-color: rgba(6,6,8,0.5);
            padding: 10px;
            border: 1px dashed var(--border);
            border-radius: 4px;
        }

        .accordion-item {
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 12px;
            background-color: var(--bg-surface);
            overflow: hidden;
        }
        
        .accordion-header {
            padding: 14px 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid var(--accent);
        }
        
        .accordion-header h3 { font-size: 0.95rem; font-weight: 700; }
        .accordion-content { display: none; padding: 16px; border-top: 1px solid var(--border); background-color: var(--bg-card); }

        nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background-color: rgba(14, 14, 18, 0.95);
            backdrop-filter: blur(20px);
            border-top: 2px solid var(--border);
            display: flex;
            height: 70px;
            z-index: 100;
        }
        
        .nav-btn {
            flex: 1; background: none; border: none; color: var(--text-muted);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; gap: 4px;
        }
        
        .nav-btn.active { color: var(--accent); }
        .nav-btn svg { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>

    <header>
        <h1>MASS DYNAMIC PRO</h1>
    </header>

    <div id="tracker" class="page active">
        <div class="card">
            <h2>Anatomy Target Engine</h2>
            
            <div class="muscle-map-container">
                <div class="muscle-map-pane">
                    <span>Anterior Matrix</span>
                    <div class="anatomy-viewport">
                        <img class="anatomy-img-layer" src="https://i.ibb.co/6RdfXmF/anterior-anatomy.png" alt="Anterior Base">
                        <svg class="anatomy-svg-overlay" viewBox="0 0 100 220">
                            <path class="muscle-node" data-muscle="shoulders" d="M38,36 C42,32 45,35 45,41 L36,41 Z M62,36 C58,32 55,35 55,41 L64,41 Z" />
                            <path class="muscle-node" data-muscle="shoulders" d="M22,42 C16,46 14,58 19,70 L26,62 Q25,48 29,42 Z M78,42 C84,46 86,58 81,70 L74,62 Q75,48 71,42 Z" />
                            <path class="muscle-node" data-muscle="chest" d="M30,44 C42,42 49,46 50,53 C51,46 58,42 70,44 C75,56 71,68 50,70 C29,68 25,56 30,44 Z" />
                            <path class="muscle-node" data-muscle="abs" d="M35,74 L65,74 L62,118 L38,118 Z" />
                            <path class="muscle-node" data-muscle="arms" d="M18,72 C14,80 10,100 12,116 L19,116 L22,76 Z M82,72 C86,80 90,100 88,116 L81,116 L78,76 Z" />
                            <path class="muscle-node" data-muscle="legs" d="M24,124 L47,124 L44,185 L26,185 Z M53,124 L76,124 L74,185 L56,185 Z" />
                        </svg>
                    </div>
                </div>

                <div class="muscle-map-pane">
                    <span>Posterior Matrix</span>
                    <div class="anatomy-viewport">
                        <img class="anatomy-img-layer" src="https://i.ibb.co/GvX8gNq/posterior-anatomy.png" alt="Posterior Base">
                        <svg class="anatomy-svg-overlay" viewBox="0 0 100 220">
                            <path class="muscle-node" data-muscle="back" d="M28,46 C42,48 58,48 72,46 C76,68 68,94 50,98 C32,94 24,68 28,46 Z" />
                            <path class="muscle-node" data-muscle="back" d="M35,100 L65,100 L61,122 L39,122 Z" />
                            <path class="muscle-node" data-muscle="arms" d="M19,62 L11,110 L18,110 L23,72 Z M81,62 L89,110 L82,110 L77,72 Z" />
                            <path class="muscle-node" data-muscle="legs" d="M25,124 C40,118 50,124 50,138 C50,124 60,118 75,124 C79,148 52,158 50,158 C48,158 21,148 25,124 Z" />
                            <path class="muscle-node" data-muscle="legs" d="M25,160 L46,160 L43,210 L24,210 Z M54,160 L75,160 L76,210 L57,210 Z" />
                        </svg>
                    </div>
                </div>
            </div>

            <div id="filterBanner" class="filter-status-banner">
                <span>FILTER BANNER: <strong id="filterLabel">NONE</strong> SELECTED</span>
                <button class="clear-filter-btn" onclick="resetMuscleFilter()">Reset View</button>
            </div>

            <h2>Log Workout Dataset</h2>
            <div class="input-group">
                <label>Exercise Identity</label>
                <select id="exercise"></select>
            </div>
            <div class="row">
                <div class="input-group" style="flex: 1;">
                    <label>Mass Load (kg)</label>
                    <input type="number" id="weight" placeholder="70" step="2.5">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Rep Count</label>
                    <input type="number" id="reps" placeholder="8">
                </div>
            </div>
            <button class="primary-btn" onclick="saveSet()">Execute Data Logging</button>
        </div>

        <div class="card">
            <h2>Telemetry Analytics</h2>
            <div class="input-group" style="margin-bottom: 12px;">
                <label>Target Telemetry Stream Focus</label>
                <select id="chartFilter" onchange="updateChartMetrics()"></select>
            </div>
            <div class="chart-container">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Historical Performance Logs</h2>
            <div id="logHistory"></div>
            <button onclick="clearHistory()" style="background: none; color: var(--border-laser); border: 1px dashed rgba(255,0,85,0.4); margin-top: 18px; padding: 12px; font-size: 0.75rem; border-radius: 4px; font-weight:700; width:100%; cursor:pointer;">CLEAR SYSTEM STORAGE FLASH MEMORY</button>
        </div>
    </div>

    <div id="meals" class="page">
        <div class="card metrics-banner">
            <h2>Pipeline Surplus Configuration</h2>
            <p style="font-size: 1.6rem; font-weight: 900; color: var(--text-main);">3,100 KCAL</p>
            <p style="font-size: 0.8rem; color: var(--text-muted); font-weight:700;">P: 175G // C: 420G // F: 80G</p>
        </div>
        <div class="card" style="padding: 16px;">
            <label style="margin-bottom: 8px;">Target Rotation Core Pipeline</label>
            <select id="daySelect" onchange="renderDayMenu()">
                <option value="1">Day 1 (Monday)</option>
                <option value="2">Day 2 (Tuesday)</option>
                <option value="3">Day 3 (Wednesday)</option>
                <option value="4">Day 4 (Thursday)</option>
                <option value="5">Day 5 (Friday)</option>
                <option value="6">Day 6 (Saturday)</option>
                <option value="7">Day 7 (Sunday)</option>
            </select>
        </div>
        <h2 id="menuDayTitle" style="margin-bottom: 14px;">Monday Menu Manifest</h2>
        <div id="dynamicMenuContainer"></div>
    </div>

    <nav>
        <button class="nav-btn active" onclick="switchPage('tracker', this)">
            <svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43l-2.86-2.86L17.71 12l2.86 2.86M4.29 12l1.43-1.43L2.86 7.71 1.43 9.14 4.29 12m11.14-5.14L14 8.29l2.86 2.86 1.43-1.43-2.86-2.86M8.29 14l1.43 1.43 2.86-2.86-1.43-1.43L8.29 14M9.71 5.43L11.14 4 8.29 1.14 6.86 2.57l2.85 2.86M14.29 20l-1.43-1.43-2.86 2.86 1.43 1.43 2.86-2.86M22 2v4h-4V2h4zM6 18v4H2v-4h4z"/></svg>
            <span>Telemetry</span>
        </button>
        <button class="nav-btn" onclick="switchPage('meals', this)">
            <svg viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7m8-3h-3v14h-2.5V6h-3V2h8.5v4z"/></svg>
            <span>Nutrition</span>
        </button>
    </nav>

    <script>
        let performanceChart = null;
        let selectedMuscleGroup = null;

        const exerciseDatabase = {
            chest: ["Flat Bench Press", "Incline Dumbbell Press", "Cable Chest Fly", "Pec Deck Machine"],
            back: ["Deadlift", "Romanian Deadlift (RDL)", "Barbell Row", "Lat Pulldown", "Seated Cable Row (V-Bar)"],
            shoulders: ["Overhead Dumbbell Press", "Machine Shoulder Press", "Cable Lateral Raise", "Dumbbell Lateral Raise"],
            abs: ["Weighted Hanging Leg Raise", "Cable Crunch", "Ab-Wheel Rollout"],
            legs: ["Barbell Back Squat", "Leg Extension Machine", "Seated Hamstring Curl", "Lying Leg Curl Machine", "Calf Raise Machine"],
            arms: ["Tricep Rope Pushdown", "Cable Bicep Curl", "Preacher Curl Machine"]
        };

        const recipes = {
            hash: { title: "Savory Potato & Egg Hash", macros: "730 kcal | 28g P" },
            oats: { title: "Mass Power Overnight Berry Oats", macros: "760 kcal | 35g P" },
            breakfastWrap: { title: "Ultimate Breakfast Wrap Duo", macros: "780 kcal | 30g P" },
            steakPasta: { title: "Creamy Garlic Steak Pasta", macros: "860 kcal | 58g P" },
            cajunWrap: { title: "Spicy Cajun Chicken Wrap Duo", macros: "820 kcal | 52g P" },
            beefSweetPotato: { title: "Sweet Potato & Beef Taco Skillet", macros: "840 kcal | 48g P" },
            soyGarlicBowl: { title: "Soy-Garlic Chicken Rice Bowl", macros: "790 kcal | 54g P" },
            honeySalmon: { title: "Honey-Soy Salmon & Sesame Rice", macros: "830 kcal | 46g P" },
            bbqPotato: { title: "BBQ Chicken & Roasted Potatoes", macros: "810 kcal | 50g P" },
            turkeyChili: { title: "Hearty Turkey & Bean Chili", macros: "790 kcal | 52g P" },
            beefRiceWrap: { title: "Loaded Beef & Rice Monster Burrito", macros: "850 kcal | 46g P" },
            snackA: { title: "Protein Refuel Wrap", macros: "560 kcal | 26g P" },
            snackB: { title: "Quick Savory Egg & Rice Mash", macros: "540 kcal | 24g P" },
            snackC: { title: "Honey Peanut Butter Rice Cakes", macros: "510 kcal | 20g P" }
        };

        const daySchedules = {
            "1": [ {tag: "Meal 1", ref: "hash"}, {tag: "Meal 2", ref: "cajunWrap"}, {tag: "Meal 3", ref: "snackA"}, {tag: "Meal 4", ref: "soyGarlicBowl"} ],
            "2": [ {tag: "Meal 1", ref: "oats"}, {tag: "Meal 2", ref: "steakPasta"}, {tag: "Meal 3", ref: "snackB"}, {tag: "Meal 4", ref: "bbqPotato"} ],
            "3": [ {tag: "Meal 1", ref: "breakfastWrap"}, {tag: "Meal 2", ref: "beefSweetPotato"}, {tag: "Meal 3", ref: "snackC"}, {tag: "Meal 4", ref: "honeySalmon"} ],
            "4": [ {tag: "Meal 1", ref: "oats"}, {tag: "Meal 2", ref: "cajunWrap"}, {tag: "Meal 3", ref: "snackA"}, {tag: "Meal 4", ref: "turkeyChili"} ],
            "5": [ {tag: "Meal 1", ref: "hash"}, {tag: "Meal 2", ref: "steakPasta"}, {tag: "Meal 3", ref: "snackC"}, {tag: "Meal 4", ref: "beefRiceWrap"} ],
            "6": [ {tag: "Meal 1", ref: "breakfastWrap"}, {tag: "Meal 2", ref: "honeySalmon"}, {tag: "Meal 3", ref: "snackB"}, {tag: "Meal 4", ref: "soyGarlicBowl"} ],
            "7": [ {tag: "Meal 1", ref: "oats"}, {tag: "Meal 2", ref: "beefSweetPotato"}, {tag: "Meal 3", ref: "snackA"}, {tag: "Meal 4", ref: "turkeyChili"} ]
        };

        function setupMuscleMapListeners() {
            document.querySelectorAll('.muscle-node').forEach(el => {
                el.addEventListener('click', function() {
                    const group = this.getAttribute('data-muscle');
                    document.querySelectorAll('.muscle-node').forEach(m => m.classList.remove('selected'));
                    document.querySelectorAll(`.muscle-node[data-muscle="${group}"]`).forEach(m => m.classList.add('selected'));
                    
                    selectedMuscleGroup = group;
                    renderExerciseDropdown();
                    
                    document.getElementById('filterLabel').textContent = group;
                    document.getElementById('filterBanner').style.display = 'flex';
                });
            });
        }

        function renderExerciseDropdown() {
            const dropdown = document.getElementById('exercise');
            dropdown.innerHTML = '';

            if (selectedMuscleGroup && exerciseDatabase[selectedMuscleGroup]) {
                exerciseDatabase[selectedMuscleGroup].forEach(ex => {
                    dropdown.innerHTML += `<option value="${ex}">${ex}</option>`;
                });
            } else {
                Object.keys(exerciseDatabase).forEach(category => {
                    let groupHTML = `<optgroup label="${category.toUpperCase()}">`;
                    exerciseDatabase[category].forEach(ex => { groupHTML += `<option value="${ex}">${ex}</option>`; });
                    groupHTML += `</optgroup>`;
                    dropdown.innerHTML += groupHTML;
                });
            }
        }

        function resetMuscleFilter() {
            selectedMuscleGroup = null;
            document.querySelectorAll('.muscle-node').forEach(m => m.classList.remove('selected'));
            document.getElementById('filterBanner').style.display = 'none';
            renderExerciseDropdown();
        }

        function switchPage(pageId, btnElement) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btnElement.classList.add('active');
            if (pageId === 'tracker') { updateChartMetrics(); }
        }

        function renderDayMenu() {
            const currentDay = document.getElementById('daySelect').value;
            const container = document.getElementById('dynamicMenuContainer');
            if (!container) return;
            container.innerHTML = daySchedules[currentDay].map(item => {
                const data = recipes[item.ref];
                return `
                    <div class="accordion-item">
                        <div class="accordion-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'block' ? 'none' : 'block'">
                            <div><h3>${data.title}</h3></div>
                            <span style="color:var(--accent);">▼</span>
                        </div>
                        <div class="accordion-content"><p>${data.macros}</p></div>
                    </div>
                `;
            }).join('');
        }

        function saveSet() {
            const exercise = document.getElementById('exercise').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const reps = parseInt(document.getElementById('reps').value);
            if(!weight || !reps || !exercise) return alert("Parameters missing.");

            const timestamp = new Date().toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
            let currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            currentLogs.unshift({ exercise, weight, reps, timestamp });
            localStorage.setItem('workoutLogs', JSON.stringify(currentLogs));

            document.getElementById('weight').value = '';
            document.getElementById('reps').value = '';
            displayLogs(); populateChartFilter(); updateChartMetrics();
        }

        function displayLogs() {
            const historyContainer = document.getElementById('logHistory');
            let currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            if(currentLogs.length === 0) {
                historyContainer.innerHTML = `<p style="color:var(--text-muted); font-size:0.8rem; text-align:center;">No entries logged.</p>`;
                return;
            }
            historyContainer.innerHTML = currentLogs.map(item => `
                <div class="log-item">
                    <div class="log-info-block"><h4>${item.exercise}</h4><p>${item.timestamp}</p></div>
                    <div class="log-value-badge">${item.weight}kg × ${item.reps}</div>
                </div>
            `).join('');
        }

        function populateChartFilter() {
            const filterSelect = document.getElementById('chartFilter');
            const currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            const exercisesInLog = [...new Set(currentLogs.map(item => item.exercise))];
            if(exercisesInLog.length === 0) { filterSelect.innerHTML = `<option value="">No metrics found</option>`; return; }
            filterSelect.innerHTML = exercisesInLog.map(ex => `<option value="${ex}">${ex}</option>`).join('');
        }

        function buildPerformanceChart() {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#00e5ff', borderWidth: 2, tension: 0.1, fill: true, backgroundColor: 'rgba(0,229,255,0.02)' }] },
                options: { plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#1a1a26' } }, y: { grid: { color: '#1a1a26' } } } }
            });
        }

        function updateChartMetrics() {
            if(!performanceChart) return;
            const targetExercise = document.getElementById('chartFilter').value;
            let currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            let matches = currentLogs.filter(item => item.exercise === targetExercise).reverse();
            performanceChart.data.labels = matches.map(item => item.timestamp);
            performanceChart.data.datasets[0].data = matches.map(item => Math.round(item.weight * (1 + item.reps / 30)));
            performanceChart.update();
        }

        function clearHistory() { if(confirm("Clear storage?")) { localStorage.removeItem('workoutLogs'); displayLogs(); populateChartFilter(); updateChartMetrics(); } }

        window.onload = function() {
            setupMuscleMapListeners(); renderExerciseDropdown(); displayLogs(); buildPerformanceChart(); populateChartFilter(); updateChartMetrics(); renderDayMenu();
        };
    </script>
</body>
</html>
