<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mass Dynamic Tracker</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #4dadf7;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border: #2d2d2d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        header {
            background-color: var(--card-bg);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.5px; }
        h2 { font-size: 1.1rem; margin-bottom: 15px; color: var(--accent); }

        .page {
            display: none;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .page.active { display: block; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .input-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        input, select {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus, select:focus {
            border-color: var(--accent);
            outline: none;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        button {
            width: 100%;
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        button:active { opacity: 0.9; }

        .log-item {
            border-bottom: 1px solid var(--border);
            padding: 10px 0;
        }
        .log-item:last-child { border: none; }
        .log-meta { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px;}

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .todo-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
        }

        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border);
            display: flex;
            height: 65px;
            z-index: 100;
        }
        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            gap: 4px;
            margin: 0;
            padding: 0;
        }
        .nav-btn.active {
            color: var(--accent);
        }
        .nav-btn svg { width: 22px; height: 22px; fill: currentColor; }
    </style>
</head>
<body>

    <header>
        <h1>MASS DYNAMIC</h1>
    </header>

    <!-- TRACKING PAGE -->
    <div id="tracker" class="page active">
        <div class="card">
            <h2>Log Workout Set</h2>
            <div class="input-group">
                <label>Exercise</label>
                <select id="exercise">
                    <option>Flat Bench Press</option>
                    <option>Barbell Back Squat</option>
                    <option>Deadlift</option>
                    <option>Barbell Row</option>
                    <option>Overhead Dumbbell Press</option>
                    <option>Lat Pulldown</option>
                    <option>Romanian Deadlift (RDL)</option>
                    <option>Lateral Raises</option>
                </select>
            </div>
            <div class="row">
                <div class="input-group" style="flex: 1;">
                    <label>Weight (kg)</label>
                    <input type="number" id="weight" placeholder="70" step="2.5">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Reps</label>
                    <input type="number" id="reps" placeholder="8">
                </div>
            </div>
            <button onclick="saveSet()">Log Set</button>
        </div>

        <div class="card">
            <h2>Workout History</h2>
            <div id="logHistory"></div>
            <button onclick="clearHistory()" style="background: none; color: red; border: 1px solid red; margin-top: 15px; padding: 8px; font-size: 0.85rem;">Clear All History</button>
        </div>
    </div>

    <!-- MEAL PREP PAGE -->
    <div id="meals" class="page">
        <div class="card" style="border-left: 4px solid var(--accent);">
            <h2>Daily Target: Lean Bulk</h2>
            <p style="font-size: 1.3rem; font-weight: bold; margin-bottom: 4px;">3,100 kcal</p>
            <p style="font-size: 0.9rem; color: var(--text-muted);">Protein: 175g | Carbs: 420g | Fats: 80g</p>
        </div>

        <div class="card">
            <h2>Bulk Grocery Checklist</h2>
            <div class="todo-item"><input type="checkbox"> <label style="color:var(--text-main); font-size:1rem;">Chicken Breast (1.2kg prep)</label></div>
            <div class="todo-item"><input type="checkbox"> <label style="color:var(--text-main); font-size:1rem;">Eggs (2-3 dozen)</label></div>
            <div class="todo-item"><input type="checkbox"> <label style="color:var(--text-main); font-size:1rem;">Potatoes & Rice</label></div>
            <div class="todo-item"><input type="checkbox"> <label style="color:var(--text-main); font-size:1rem;">Tortilla Wraps</label></div>
            <div class="todo-item"><input type="checkbox"> <label style="color:var(--text-main); font-size:1rem;">Broccoli, Peppers & Onions</label></div>
        </div>

        <div class="card">
            <h2>Today's Menu Layout</h2>
            <div style="margin-bottom: 12px;"><strong style="color: var(--accent);">Meal 1:</strong> Savory Potato & Egg Hash</div>
            <div style="margin-bottom: 12px;"><strong style="color: var(--accent);">Meal 2:</strong> Cajun Chicken Wrap</div>
            <div style="margin-bottom: 12px;"><strong style="color: var(--accent);">Meal 3:</strong> Protein Refuel Snack</div>
            <div><strong style="color: var(--accent);">Meal 4:</strong> Soy-Garlic Chicken Bowl</div>
        </div>
    </div>

    <nav>
        <button class="nav-btn active" onclick="switchPage('tracker', this)">
            <svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43l-2.86-2.86L17.71 12l2.86 2.86M4.29 12l1.43-1.43L2.86 7.71 1.43 9.14 4.29 12m11.14-5.14L14 8.29l2.86 2.86 1.43-1.43-2.86-2.86M8.29 14l1.43 1.43 2.86-2.86-1.43-1.43L8.29 14M9.71 5.43L11.14 4 8.29 1.14 6.86 2.57l2.85 2.86M14.29 20l-1.43-1.43-2.86 2.86 1.43 1.43 2.86-2.86M22 2v4h-4V2h4zM6 18v4H2v-4h4z"/></svg>
            <span>Workout</span>
        </button>
        <button class="nav-btn" onclick="switchPage('meals', this)">
            <svg viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7m8-3h-3v14h-2.5V6h-3V2h8.5v4z"/></svg>
            <span>Nutrition</span>
        </button>
    </nav>

    <script>
        function switchPage(pageId, btnElement) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btnElement.classList.add('active');
            window.scrollTo(0,0);
        }

        window.onload = function() { displayLogs(); };

        function saveSet() {
            const exercise = document.getElementById('exercise').value;
            const weight = document.getElementById('weight').value;
            const reps = document.getElementById('reps').value;
            if(!weight || !reps) return alert("Please fill out both weight and reps!");

            const timestamp = new Date().toLocaleDateString('en-US', {month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'});
            const newSet = { exercise, weight, reps, timestamp };

            let currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            currentLogs.unshift(newSet);
            localStorage.setItem('workoutLogs', JSON.stringify(currentLogs));

            document.getElementById('weight').value = '';
            document.getElementById('reps').value = '';
            displayLogs();
        }

        function displayLogs() {
            const historyContainer = document.getElementById('logHistory');
            let currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            if(currentLogs.length === 0) {
                historyContainer.innerHTML = `<p style="color:var(--text-muted); font-size:0.9rem; text-align:center; padding: 20px 0;">No sets logged yet.</p>`;
                return;
            }
            historyContainer.innerHTML = currentLogs.map(item => `
                <div class="log-item">
                    <div class="log-meta"><span>${item.timestamp}</span></div>
                    <div><strong>${item.exercise}</strong>: ${item.weight} kg × ${item.reps} reps</div>
                </div>
            `).join('');
        }

        function clearHistory() {
            if(confirm("Delete all sets?")) {
                localStorage.removeItem('workoutLogs');
                displayLogs();
            }
        }
    </script>
</body>
</html>
