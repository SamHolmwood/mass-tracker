<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mass Dynamic Pro</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #060608;
            --bg-surface: #0e0e12;
            --bg-card: #15151f;
            --accent: #00e5ff;
            --accent-dim: #008ba3;
            --accent-glow: rgba(0, 229, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border: #222235;
            --border-laser: #ff0055;
            --grid-color: rgba(0, 229, 255, 0.025);
            --muscle-base: transparent;
            --muscle-stroke: transparent;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 24px 24px, 24px 24px;
            color: var(--text-main);
            padding-bottom: 95px;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(180deg, var(--bg-surface) 0%, rgba(14,14,18,0.9) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent-dim);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.05rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 12px var(--accent);
        }

        h2 { 
            font-size: 0.9rem;
            font-weight: 900; 
            letter-spacing: 1.5px;
            margin-bottom: 16px; 
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page {
            display: none;
            padding: 20px 16px;
            max-width: 480px;
            margin: 0 auto;
        }

        .page.active { display: block; }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .muscle-map-container {
            display: flex;
            justify-content: space-between;
            background-color: #0b0b10;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
        }

        .muscle-map-pane {
            width: 49%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            background-image: linear-gradient(rgba(0, 229, 255, 0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.01) 1px, transparent 1px);
            background-size: 14px 14px;
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: 4px;
            padding: 8px 4px;
        }

        .muscle-map-pane span {
            font-size: 0.65rem;
            font-weight: 900;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            text-transform: uppercase;
            z-index: 10;
        }

        /* HARDCODED EMBEDDED GRAPHIC PATH */
        .anatomy-viewport {
            width: 100%;
            height: 380px;
            position: relative;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none" stroke="%2300e5ff" stroke-width="1.2" stroke-opacity="0.65"><g id="anterior-panel"><path d="M50,22 c-3,-6 -5,-7 -8,-7 c-6,0 -9,4 -10,11 c0,4 2,7 3,9 l-3,4 l-14,1 c-7,2 -10,9 -12,21 l-1,24 c0,6 4,8 7,6 l3,-14 l-1,29 l1,30l-8,39 l19,0 l9,-39 l2,-24 l2,24 l9,39 l19,0 l-8,-39 l1,-30 l-1,-29 l3,14 c3,2 7,0 7,-6 l-1,-24 c-2,-12 -5,-19 -12,-21 l-14,-1 l-3,-4 c1,-2 3,-5 3,-9 c-1,-7 -4,-11 -10,-11 c-3,0 -5,1 -8,7 Z" stroke-dasharray="1,1"/><path d="M32,45 c-4,1 -8,6 -9,12 c-1,6 -1,12 0,16 l7,-5 c-1,-8 0,-17 2,-23 Z"/><path d="M68,45 c4,1 8,6 9,12 c1,6 1,12 0,16 l-7,-5 c1,-8 0,-17 -2,-23 Z"/><path d="M34,48 c6,-2 13,0 15,5 c-2,10 -10,12 -17,9 c-2,-5 -1,-10 2,-4 Z"/><path d="M66,48 c-6,-2 -13,0 -15,5 c2,10 10,12 17,9 c2,-5 1,-10 -2,-4 Z"/><path d="M42,68 l16,0 l0,32 l-16,0 z" stroke-dasharray="2,2"/><path d="M28,95 c6,0 18,2 17,31 l-14,0 c-8,-14 -7,-23 -3,-31 z"/><path d="M72,95 c-6,0 -18,2 -17,31 l14,0 c8,-14 7,-23 3,-31 z"/></g><g id="posterior-panel" transform="translate(100,0)"><path d="M50,22 c-3,-6 -5,-7 -8,-7 c-6,0 -9,4 -10,11 c0,4 2,7 3,9 l-3,4 l-14,1 c-7,2 -10,9 -12,21 l-1,24 c0,6 4,8 7,6 l3,-14 l-1,29 l1,30l-8,39 l19,0 l9,-39 l2,-24 l2,24 l9,39 l19,0 l-8,-39 l1,-30 l-1,-29 l3,14 c3,2 7,0 7,-6 l-1,-24 c-2,-12 -5,-19 -12,-21 l-14,-1 l-3,-4 c1,-2 3,-5 3,-9 c-1,-7 -4,-11 -10,-11 c-3,0 -5,1 -8,7 Z" stroke-dasharray="1,1"/><line x1="50" y1="38" x2="50" y2="105" stroke-dasharray="2,3"/><path d="M44,35 l12,0 l4,10 c-6,2 -14,2 -20,0 z"/><path d="M28,45 c10,2 20,6 21,28 c-9,-2 -22,-11 -21,-28 z"/><path d="M72,45 c-10,2 -20,6 -21,28 c9,-2 22,-11 21,-28 z"/><path d="M40,72 l20,0 l-5,18 l-10,0 z"/><path d="M29,94 c10,-4 20,-1 21,12 c-10,2 -21,-3 -21,-12 z"/><path d="M71,94 c-10,-4 -20,-1 -21,12 c10,2 21,-3 21,-12 z"/><path d="M30,108 l19,0 l-2,31 l-17,0 z"/><path d="M70,108 l-19,0 l2,31 l17,0 z"/></g></svg>');
            background-size: 200% 100%;
            background-repeat: no-repeat;
        }

        .anatomy-viewport.anterior {
            background-position: 0% center;
        }

        .anatomy-viewport.posterior {
            background-position: 100% center;
        }

        .anatomy-svg-overlay {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        .body-silhouette { 
            fill: none; 
            stroke: none; 
        }
        
        .skeletal-spine { 
            stroke: none; 
        }
        
        .muscle-node {
            fill: var(--muscle-base);
            stroke: var(--muscle-stroke);
            stroke-width: 0.9;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
        }

        .muscle-node:hover { 
            fill: rgba(0, 229, 255, 0.25);
            stroke: var(--accent);
            stroke-width: 1px;
        }

        .muscle-node.selected {
            fill: rgba(255, 0, 85, 0.45);
            stroke: #ffffff;
            stroke-width: 1.2;
            filter: drop-shadow(0 0 8px var(--border-laser));
        }

        .filter-status-banner {
            display: none;
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid var(--accent-dim);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 18px;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .filter-status-banner strong { color: var(--accent); text-transform: uppercase; font-weight: 900; }
        .clear-filter-btn { background: none; border: 1px solid var(--border-laser); color: var(--border-laser); font-size: 0.65rem; font-weight: 900; padding: 6px 10px; border-radius: 3px; cursor: pointer; text-transform: uppercase;}

        .input-group { margin-bottom: 14px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; }
        input, select { width: 100%; background-color: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 4px; font-size: 0.95rem; font-weight: 600; }
        input:focus, select:focus { border-color: var(--accent); outline: none; }
        .row { display: flex; gap: 12px; }

        button.primary-btn {
            width: 100%;
            background: #000; color: var(--accent); border: 1px solid var(--accent); padding: 14px; border-radius: 4px; font-size: 0.85rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px;
            cursor: pointer; margin-top: 6px;
        }
        button.primary-btn:active { background: var(--accent); color: #000; }

        .log-item { border-bottom: 1px solid var(--border); padding: 14px 2px; display: flex; justify-content: space-between; align-items: center; }
        .log-info-block h4 { font-size: 0.9rem; font-weight: 700; }
        .log-info-block p { font-size: 0.75rem; color: var(--text-muted); }
        .log-value-badge { background-color: var(--bg-card); padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; color: var(--accent); font-weight: 700; }
        .chart-container { position: relative; width: 100%; margin-top: 8px; background-color: rgba(6,6,8,0.5); padding: 10px; border: 1px dashed var(--border); border-radius: 4px; }

        .accordion-item { border: 1px solid var(--border); border-radius: 4px; margin-bottom: 12px; background-color: var(--bg-surface); overflow: hidden; }
        .accordion-header { padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--accent); }
        .accordion-content { display: none; padding: 16px; border-top: 1px solid var(--border); background-color: var(--bg-card); }
        
        .recipe-list { list-style: none; margin-top: 6px; margin-bottom: 14px; padding-left: 4px; }
        .recipe-list li { font-size: 0.85rem; color: #cbd5e1; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .recipe-list li::before { content: "▪"; color: var(--accent); font-size: 0.7rem; }
        
        .recipe-steps { padding-left: 16px; margin-top: 6px; color: #cbd5e1; font-size: 0.85rem; }
        .recipe-steps li { margin-bottom: 8px; line-height: 1.4; }

        nav { position: fixed; bottom: 0; left: 0; right: 0; background-color: rgba(14, 14, 18, 0.95); backdrop-filter: blur(20px); border-top: 2px solid var(--border); display: flex; height: 70px; z-index: 100; }
        .nav-btn { flex: 1; background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; gap: 4px; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn svg { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>

    <header>
        <h1>MASS DYNAMIC PRO</h1>
    </header>

    <div id="tracker" class="page active">
        <div class="card">
            <h2>Anatomy Target Engine</h2>
            
            <div class="muscle-map-container">
                <div class="muscle-map-pane">
                    <span>Anterior Matrix</span>
                    <div class="anatomy-viewport anterior">
                        <svg class="anatomy-svg-overlay" viewBox="0 0 100 240">
                            <path class="muscle-node" data-muscle="shoulders" d="M12,28 C8,33 4,40 4,48 C4,52 6,56 8,60 L14,52 Z" />
                            <path class="muscle-node" data-muscle="shoulders" d="M88,28 C92,33 96,40 96,48 C96,52 94,56 92,60 L86,52 Z" />
                            <path class="muscle-node" data-muscle="chest" d="M22,32 C32,29 45,32 49,40 C46,54 34,56 23,52 Z" />
                            <path class="muscle-node" data-muscle="chest" d="M78,32 C68,29 55,32 51,40 C54,54 66,56 77,52 Z" />

                            <path class="muscle-node" data-muscle="legs" d="M20,98 C35,98 48,102 46,155 L24,155 C12,130 14,110 20,98 Z" />

                </div>

                <div class="muscle-map-pane">
                    <span>Posterior Matrix</span>
                    <div class="anatomy-viewport posterior">
                        <svg class="anatomy-svg-overlay" viewBox="0 0 100 240">
                            <path class="muscle-node" data-muscle="back" d="M24,35 L76,35 L70,80 L30,80 Z" />
                            <path class="muscle-node" data-muscle="arms" d="M14,42 L8,80 L16,80 L18,48 Z" />
                            <path class="muscle-node" data-muscle="arms" d="M86,42 L92,80 L84,80 L82,48 Z" />

                            <path class="muscle-node" data-muscle="legs" d="M82,94 C66,90 52,94 51,112 L84,112 Z" />
                            <path class="muscle-node" data-muscle="legs" d="M18,115 L46,115 L44,160 L16,160 Z" />
                            <path class="muscle-node" data-muscle="legs" d="M54,115 L82,115 L80,160 L56,160 Z" />
                        </svg>
                    </div>
                </div>
            </div>

            <div id="filterBanner" class="filter-status-banner">
                <span>FILTER BANNER: <strong id="filterLabel">NONE</strong> SELECTED</span>
                <button class="clear-filter-btn" onclick="resetMuscleFilter()">Reset View</button>
            </div>

            <h2>Log Workout Dataset</h2>
            <div class="input-group">
                <label>Exercise Identity</label>
                <select id="exercise"></select>
            </div>
            <div class="row">
                <div class="input-group" style="flex: 1;">
                    <label>Mass Load (kg)</label>
                    <input type="number" id="weight" placeholder="70" step="2.5">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Rep Count</label>
                    <input type="number" id="reps" placeholder="8">
                </div>
            </div>
            <button class="primary-btn" onclick="saveSet()">Execute Data Logging</button>
        </div>

        <div class="card">
            <h2>Telemetry Analytics</h2>
            <div class="input-group" style="margin-bottom: 12px;">
                <label>Target Telemetry Stream Focus</label>
                <select id="chartFilter" onchange="updateChartMetrics()"></select>
            </div>
            <div class="chart-container">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Historical Performance Logs</h2>
            <div id="logHistory"></div>
            <button onclick="clearHistory()" style="background: none; color: var(--border-laser); border: 1px dashed rgba(255,0,85,0.4); margin-top: 18px; padding: 12px; font-size: 0.75rem; border-radius: 4px; font-weight:700; width:100%; cursor:pointer;">CLEAR SYSTEM STORAGE FLASH MEMORY</button>
        </div>
    </div>

    <div id="meals" class="page">
        <div class="card" style="border-left: 3px solid var(--border-laser);">
            <h2>Pipeline Surplus Configuration</h2>
            <p style="font-size: 1.6rem; font-weight: 900; color: var(--text-main);">3,100 KCAL</p>
            <p style="font-size: 0.8rem; color: var(--text-muted); font-weight:700;">P: 175G // C: 420G // F: 80G</p>
        </div>
        <div class="card" style="padding: 16px;">
            <label style="margin-bottom: 8px;">Target Rotation Core Pipeline</label>
            <select id="daySelect" onchange="renderDayMenu()">
                <option value="1">Day 1 (Monday)</option>
                <option value="2">Day 2 (Tuesday)</option>
                <option value="3">Day 3 (Wednesday)</option>
                <option value="4">Day 4 (Thursday)</option>
                <option value="5">Day 5 (Friday)</option>
                <option value="6">Day 6 (Saturday)</option>
                <option value="7">Day 7 (Sunday)</option>
            </select>
        </div>
        <h2 id="menuDayTitle" style="margin-bottom: 14px;">Monday Menu Manifest</h2>
        <div id="dynamicMenuContainer"></div>
    </div>

    <nav>
        <button class="nav-btn active" onclick="switchPage('tracker', this)">
            <svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43l-2.86-2.86L17.71 12l2.86 2.86M4.29 12l1.43-1.43L2.86 7.71 1.43 9.14 4.29 12m11.14-5.14L14 8.29l2.86 2.86 1.43-1.43-2.86-2.86M8.29 14l1.43 1.43 2.86-2.86-1.43-1.43L8.29 14M9.71 5.43L11.14 4 8.29 1.14 6.86 2.57l2.85 2.86M14.29 20l-1.43-1.43-2.86 2.86 1.43 1.43 2.86-2.86M22 2v4h-4V2h4zM6 18v4H2v-4h4z"/></svg>
            <span>Telemetry</span>
        </button>
        <button class="nav-btn" onclick="switchPage('meals', this)">
            <svg viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7m8-3h-3v14h-2.5V6h-3V2h8.5v4z"/></svg>
            <span>Nutrition</span>
        </button>
    </nav>

            },
            bbqPotato: { 
                title: "BBQ Chicken & Roasted Potatoes", 
                macros: "810 kcal | 50g P | 101g C | 15g F",
                ingredients: ["160g Chicken Breast Cubes", "350g Russet Potatoes", "40g Low Sugar BBQ Sauce", "Smoked Paprika & Garlic Powder"],
                steps: ["Cut potatoes into wedges, season with paprika and garlic, then roast at 200°C for 25 mins.", "Cook chicken breast cubes in a hot pan until golden and cooked through.", "Turn off heat, pour BBQ sauce over chicken, and toss to coat completely.", "Serve the glazed chicken alongside the crispy roasted potatoes."]
            },
            turkeyChili: { 
                title: "Hearty Turkey & Bean Chili", 
                macros: "790 kcal | 52g P | 98g C | 16g F",
                ingredients: ["150g Lean Ground Turkey", "120g Red Kidney Beans", "200g Crushed Tomatoes Base", "Chili Spices Blend"],
                steps: ["Brown ground turkey in a deep pot with chili powder, cumin, and garlic.", "Pour in crushed tomatoes and rinsed red kidney beans.", "Bring chili to a boil, then reduce heat to low.", "Cover and simmer for 15-20 minutes to allow flavors to combine completely."]
            },
            beefRiceWrap: { 
                title: "Loaded Beef & Rice Monster Burrito", 
                macros: "850 kcal | 46g P | 108g C | 22g F",
                ingredients: ["120g Lean Ground Beef", "70g Cooked Rice", "1 Jumbo Tortilla Wrap", "Salsa & Lettuce Crunch"],
                steps: ["Cook ground beef with taco spices until fully browned.", "Warm the jumbo tortilla wrap slightly to prevent tearing.", "Layer cooked rice, seasoned beef, salsa, and shredded lettuce in the center.", "Fold the sides inward and roll up tightly into a dense burrito profile."]
            },
            snackA: { 
                title: "Protein Refuel Wrap", 
                macros: "560 kcal | 26g P | 72g C | 12g F",
                ingredients: ["1 Tortilla Wrap", "20g Peanut Butter", "1 Sliced Banana", "15g Whey Protein Drizzle"],
                steps: ["Lay out the tortilla wrap flat.", "Spread peanut butter evenly across the wrap surface.", "Place banana slices along the center line.", "Mix protein powder with a tiny drop of water to make a paste, drizzle it over, and roll."]
            },
            snackB: { 
                title: "Quick Savory Egg & Rice Mash", 
                macros: "540 kcal | 24g P | 70g C | 14g F",
                ingredients: ["80g Cooked White Rice", "2 Large Whole Eggs", "Soy Sauce Drop", "Toasted Seaweed Flakes"],
                steps: ["Reheat cooked white rice until steaming hot.", "Fry two eggs in a separate pan keeping the yolks slightly runny.", "Slide the eggs directly onto the rice bowl.", "Add a drop of soy sauce, crush seaweed flakes over the top, and mash together with a fork."]
            },
            snackC: { 
                title: "Honey Peanut Butter Rice Cakes", 
                macros: "510 kcal | 20g P | 74g C | 13g F",
                ingredients: ["4 Puffed Rice Cakes", "25g Smooth Peanut Butter", "15g Honey Drizzle"],
                steps: ["Arrange 4 crisp puffed rice cakes on a flat surface.", "Divide peanut butter evenly and spread across each cake surface.", "Drizzle raw honey in a zigzag pattern across all cakes.", "Consume immediately to maintain maximum rice cake crunch."]
            }
        };

        const daySchedules = {
            "1": [ {tag: "Meal 1", ref: "hash"}, {tag: "Meal 2", ref: "cajunWrap"}, {tag: "Meal 3", ref: "snackA"}, {tag: "Meal 4", ref: "soyGarlicBowl"} ],
            "2": [ {tag: "Meal 1", ref: "oats"}, {tag: "Meal 2", ref: "steakPasta"}, {tag: "Meal 3", ref: "snackB"}, {tag: "Meal 4", ref: "bbqPotato"} ],
            "3": [ {tag: "Meal 1", ref: "breakfastWrap"}, {tag: "Meal 2", ref: "beefSweetPotato"}, {tag: "Meal 3", ref: "snackC"}, {tag: "Meal 4", ref: "honeySalmon"} ],
            "4": [ {tag: "Meal 1", ref: "oats"}, {tag: "Meal 2", ref: "cajunWrap"}, {tag: "Meal 3", ref: "snackA"}, {tag: "Meal 4", ref: "turkeyChili"} ],
            "5": [ {tag: "Meal 1", ref: "hash"}, {tag: "Meal 2", ref: "steakPasta"}, {tag: "Meal 3", ref: "snackC"}, {tag: "Meal 4", ref: "beefRiceWrap"} ],
            "6": [ {tag: "Meal 1", ref: "breakfastWrap"}, {tag: "Meal 2", ref: "honeySalmon"}, {tag: "Meal 3", ref: "snackB"}, {tag: "Meal 4", ref: "soyGarlicBowl"} ],
            "7": [ {tag: "Meal 1", ref: "oats"}, {tag: "Meal 2", ref: "beefSweetPotato"}, {tag: "Meal 3", ref: "snackA"}, {tag: "Meal 4", ref: "turkeyChili"} ]
        };

        function setupMuscleMapListeners() {
            document.querySelectorAll('.muscle-node').forEach(el => {
                el.addEventListener('click', function() {
                    const group = this.getAttribute('data-muscle');
                    document.querySelectorAll('.muscle-node').forEach(m => m.classList.remove('selected'));
                    document.querySelectorAll(`.muscle-node[data-muscle="${group}"]`).forEach(m => m.classList.add('selected'));
                    
                    selectedMuscleGroup = group;
                    renderExerciseDropdown();
                    
                    document.getElementById('filterLabel').textContent = group;
                    document.getElementById('filterBanner').style.display = 'flex';
                });
            });
        }

        function renderExerciseDropdown() {
            const dropdown = document.getElementById('exercise');
            dropdown.innerHTML = '';

            if (selectedMuscleGroup && exerciseDatabase[selectedMuscleGroup]) {
                exerciseDatabase[selectedMuscleGroup].forEach(ex => {
                    dropdown.innerHTML += `<option value="${ex}">${ex}</option>`;
                });
            } else {
                Object.keys(exerciseDatabase).forEach(category => {
                    let groupHTML = `<optgroup label="${category.toUpperCase()}">`;
                    exerciseDatabase[category].forEach(ex => { groupHTML += `<option value="${ex}">${ex}</option>`; });
                    groupHTML += `</optgroup>`;
                    dropdown.innerHTML += groupHTML;
                });
            }
        }

        function resetMuscleFilter() {
            selectedMuscleGroup = null;
            document.querySelectorAll('.muscle-node').forEach(m => m.classList.remove('selected'));
            document.getElementById('filterBanner').style.display = 'none';
            renderExerciseDropdown();
        }

        function switchPage(pageId, btnElement) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btnElement.classList.add('active');
            if (pageId === 'tracker') { updateChartMetrics(); }
        }

        function renderDayMenu() {
            const currentDay = document.getElementById('daySelect').value;
            const container = document.getElementById('dynamicMenuContainer');
            if (!container) return;
            
            const daysOfWeek = ["", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
            document.getElementById('menuDayTitle').textContent = `${daysOfWeek[parseInt(currentDay)]} Menu Manifest`;

            container.innerHTML = daySchedules[currentDay].map(item => {
                const data = recipes[item.ref];
                const ingredientItems = data.ingredients.map(ing => `<li>${ing}</li>`).join('');
                const stepItems = data.steps.map(step => `<li>${step}</li>`).join('');
                return `
                    <div class="accordion-item">
                        <div class="accordion-header" onclick="toggleAccordion(this)">
                            <div>
                                <span style="font-size:0.7rem; font-weight:900; color:var(--border-laser); text-transform:uppercase; display:block; margin-bottom:2px;">${item.tag}</span>
                                <h3>${data.title}</h3>
                            </div>
                            <span style="color:var(--accent); font-size:0.7rem;">▼</span>
                        </div>
                        <div class="accordion-content">
                            <p style="font-weight:700; color:var(--accent); font-size:0.85rem; margin-bottom:12px;">${data.macros}</p>
                            
                            <p style="font-size:0.75rem; text-transform:uppercase; font-weight:900; color:var(--text-muted); letter-spacing:0.5px;">Pipelines / Ingredients:</p>
                            <ul class="recipe-list">${ingredientItems}</ul>
                            
                            <p style="font-size:0.75rem; text-transform:uppercase; font-weight:900; color:var(--text-muted); letter-spacing:0.5px; margin-top:4px;">Preparation Instructions:</p>
                            <ol class="recipe-steps">${stepItems}</ol>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleAccordion(headerElement) {
            const content = headerElement.nextElementSibling;
            const arrow = headerElement.querySelector('span:last-child');
            if (content.style.display === 'block') {
                content.style.display = 'none';
                arrow.textContent = '▼';
            } else {
                content.style.display = 'block';
                arrow.textContent = '▲';
            }
        }

        function saveSet() {
            const exercise = document.getElementById('exercise').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const reps = parseInt(document.getElementById('reps').value);
            if(!weight || !reps || !exercise) return alert("Parameters missing.");

            const timestamp = new Date().toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
            let currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            currentLogs.unshift({ exercise, weight, reps, timestamp });
            localStorage.setItem('workoutLogs', JSON.stringify(currentLogs));

            document.getElementById('weight').value = '';
            document.getElementById('reps').value = '';
            displayLogs(); populateChartFilter(); updateChartMetrics();
        }

        function displayLogs() {
            const historyContainer = document.getElementById('logHistory');
            let currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            if(currentLogs.length === 0) {
                historyContainer.innerHTML = `<p style="color:var(--text-muted); font-size:0.8rem; text-align:center;">No entries logged.</p>`;
                return;
            }
            historyContainer.innerHTML = currentLogs.map(item => `
                <div class="log-item">
                    <div class="log-info-block"><h4>${item.exercise}</h4><p>${item.timestamp}</p></div>
                    <div class="log-value-badge">${item.weight}kg × ${item.reps}</div>
                </div>
            `).join('');
        }

        function populateChartFilter() {
            const filterSelect = document.getElementById('chartFilter');
            const currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            const exercisesInLog = [...new Set(currentLogs.map(item => item.exercise))];
            if(exercisesInLog.length === 0) { filterSelect.innerHTML = `<option value="">No metrics found</option>`; return; }
            filterSelect.innerHTML = exercisesInLog.map(ex => `<option value="${ex}">${ex}</option>`).join('');
        }

        function buildPerformanceChart() {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#00e5ff', borderWidth: 2, tension: 0.1, fill: true, backgroundColor: 'rgba(0,229,255,0.02)' }] },
                options: { plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#1a1a26' } }, y: { grid: { color: '#1a1a26' } } } }
            });
        }

        function updateChartMetrics() {
            if(!performanceChart) return;
            const targetExercise = document.getElementById('chartFilter').value;
            let currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            let matches = currentLogs.filter(item => item.exercise === targetExercise).reverse();
            performanceChart.data.labels = matches.map(item => item.timestamp);
            performanceChart.data.datasets[0].data = matches.map(item => Math.round(item.weight * (1 + item.reps / 30)));
            performanceChart.update();
        }

        function clearHistory() { if(confirm("Clear storage?")) { localStorage.removeItem('workoutLogs'); displayLogs(); populateChartFilter(); updateChartMetrics(); } }

        window.onload = function() {
            setupMuscleMapListeners();
            renderExerciseDropdown(); displayLogs(); buildPerformanceChart(); populateChartFilter(); updateChartMetrics(); renderDayMenu();
        };
    </script>
</body>
</html>
