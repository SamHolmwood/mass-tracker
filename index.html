<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mass Dynamic Pro - Anatomy Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #0a0a0f;
            --bg-surface: #12121a;
            --bg-card: #181824;
            --accent: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.2);
            --border-laser: #f43f5e;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --border: #27273a;
            
            /* MuscleWiki Accurate Mapping Aesthetics */
            --mw-body: #1e1e2f;
            --mw-stroke: #2d2d44;
            --mw-muscle-idle: #242438;
            --mw-muscle-hover: #38bdf8;
            --mw-muscle-selected: #f43f5e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding-bottom: 95px;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(180deg, var(--bg-surface) 0%, rgba(18,18,26,0.9) 100%);
            backdrop-filter: blur(12px);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .page {
            display: none;
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
        }

        .page.active { display: block; }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        /* MuscleWiki Controller Bar Toggle Button Group */
        .mw-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .mw-toggle-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mw-toggle-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* High-Fidelity Muscle Graphic Window Container */
        .muscle-map-container {
            display: flex;
            justify-content: space-between;
            background: #0d0d14;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 8px;
            margin-bottom: 16px;
        }

        .muscle-map-pane {
            width: 49%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .muscle-map-pane span {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .anatomy-viewport {
            width: 100%;
            height: 350px;
        }

        .anatomy-svg-overlay {
            width: 100%;
            height: 100%;
        }

        /* SVG Vector Curvatures Definition Architecture */
        .body-silhouette {
            fill: var(--mw-body);
            stroke: var(--mw-stroke);
            stroke-width: 1;
        }

        .muscle-node {
            fill: var(--mw-muscle-idle);
            stroke: var(--mw-stroke);
            stroke-width: 0.8;
            cursor: pointer;
            transition: fill 0.15s ease, stroke 0.15s ease;
        }

        .muscle-node:hover { 
            fill: var(--mw-muscle-hover) !important;
            stroke: #fff;
        }

        .muscle-node.selected {
            fill: var(--mw-muscle-selected) !important;
            stroke: #fff;
            filter: drop-shadow(0 0 4px rgba(244, 63, 94, 0.5));
        }

        /* Clear Status Bar Info HUD banner */
        .filter-status-banner {
            display: none;
            background: rgba(34, 211, 238, 0.06);
            border: 1px solid rgba(34, 211, 238, 0.2);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .filter-status-banner strong { color: var(--accent); text-transform: uppercase; font-weight: 800; }
        .clear-filter-btn { background: none; border: 1px solid var(--border-laser); color: var(--border-laser); font-size: 0.65rem; font-weight: 800; padding: 4px 8px; border-radius: 4px; cursor: pointer; text-transform: uppercase;}

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--accent); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { width: 100%; background-color: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 6px; font-size: 0.9rem; font-weight: 600; }
        input:focus, select:focus { border-color: var(--accent); outline: none; }
        .row { display: flex; gap: 8px; }

        button.primary-btn {
            width: 100%;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: var(--accent); border: 1px solid var(--border); padding: 14px; border-radius: 6px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; margin-top: 4px; transition: all 0.2s;
        }
        button.primary-btn:active { transform: scale(0.98); background: var(--accent); color: #000; }

        .log-item { border-bottom: 1px solid var(--border); padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .log-info-block h4 { font-size: 0.85rem; font-weight: 600; }
        .log-info-block p { font-size: 0.7rem; color: var(--text-muted); }
        .log-value-badge { background-color: var(--bg-card); padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; color: var(--accent); font-weight: 700; font-size: 0.8rem; }
        .chart-container { width: 100%; background-color: rgba(0,0,0,0.2); padding: 8px; border: 1px solid var(--border); border-radius: 6px; }

        /* Accordion items */
        .accordion-item { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; background-color: var(--bg-surface); overflow: hidden; }
        .accordion-header { padding: 12px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--accent); }
        .accordion-content { display: none; padding: 14px; border-top: 1px solid var(--border); background-color: var(--bg-card); }
        .recipe-list { list-style: none; margin: 4px 0 12px 0; }
        .recipe-list li { font-size: 0.8rem; color: #cbd5e1; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .recipe-list li::before { content: "•"; color: var(--accent); }
        .recipe-steps { padding-left: 12px; color: #cbd5e1; font-size: 0.8rem; }
        .recipe-steps li { margin-bottom: 6px; }

        /* Bottom Sticky Global Menu Navigation Hub */
        nav { position: fixed; bottom: 0; left: 0; right: 0; background-color: rgba(18, 18, 26, 0.95); backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; height: 65px; z-index: 100; }
        .nav-btn { flex: 1; background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; gap: 2px; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn svg { width: 16px; height: 16px; fill: currentColor; }
    </style>
</head>

    <script>

        const recipes = {

        const daySchedules = {

        function setGender(gender) {
            selectedGender = gender;
            document.getElementById('genderMale').classList.toggle('active', gender === 'male');
            document.getElementById('genderFemale').classList.toggle('active', gender === 'female');
            
            // Subtle aesthetic structural shifts to mock real visual targets
            const silho = document.querySelectorAll('.body-silhouette');
            silho.forEach(path => {
                if(gender === 'female') {
                    path.style.stroke = '#f472b6'; // Custom pink framework hint
                } else {
                    path.style.stroke = 'var(--mw-stroke)';
                }
            });
        }

        function setupMuscleMapListeners() {
            document.querySelectorAll('.muscle-node').forEach(el => {
                el.addEventListener('click', function() {
                    const group = this.getAttribute('data-muscle');
                    
                    document.querySelectorAll('.muscle-node').forEach(m => m.classList.remove('selected'));
                    document.querySelectorAll(`.muscle-node[data-muscle="${group}"]`).forEach(m => m.classList.add('selected'));
                    
                    selectedMuscleGroup = group;
                    renderExerciseDropdown();
                    
                    document.getElementById('filterLabel').textContent = group;
                    document.getElementById('filterBanner').style.display = 'flex';
                });
            });
        }

        function renderExerciseDropdown() {
            const dropdown = document.getElementById('exercise');
            dropdown.innerHTML = '';

            if (selectedMuscleGroup && exerciseDatabase[selectedMuscleGroup]) {
                exerciseDatabase[selectedMuscleGroup].forEach(ex => {
                    dropdown.innerHTML += `<option value="${ex}">${ex}</option>`;
                });
            } else {
                Object.keys(exerciseDatabase).forEach(category => {
                    let groupHTML = `<optgroup label="${category.toUpperCase()}">`;
                    exerciseDatabase[category].forEach(ex => { groupHTML += `<option value="${ex}">${ex}</option>`; });
                    groupHTML += `</optgroup>`;
                    dropdown.innerHTML += groupHTML;
                });
            }
        }

        function resetMuscleFilter() {
            selectedMuscleGroup = null;
            document.querySelectorAll('.muscle-node').forEach(m => m.classList.remove('selected'));
            document.getElementById('filterBanner').style.display = 'none';
            renderExerciseDropdown();
        }

        function switchPage(pageId, btnElement) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btnElement.classList.add('active');
            if (pageId === 'tracker') { updateChartMetrics(); }
        }

        function renderDayMenu() {
            const currentDay = document.getElementById('daySelect').value;
            const container = document.getElementById('dynamicMenuContainer');
            if (!container) return;
            
            const daysOfWeek = ["", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
            document.getElementById('menuDayTitle').textContent = `${daysOfWeek[parseInt(currentDay)]} Menu Manifest`;

            container.innerHTML = daySchedules[currentDay].map(item => {
                const data = recipes[item.ref];
                const ingredientItems = data.ingredients.map(ing => `<li>${ing}</li>`).join('');
                const stepItems = data.steps.map(step => `<li>${step}</li>`).join('');
                return `
                    <div class="accordion-item">
                        <div class="accordion-header" onclick="toggleAccordion(this)">
                            <div>
                                <span style="font-size:0.65rem; font-weight:900; color:var(--border-laser); text-transform:uppercase; display:block; margin-bottom:2px;">${item.tag}</span>
                                <h3 style="font-size:0.9rem;">${data.title}</h3>
                            </div>
                            <span style="color:var(--accent); font-size:0.7rem;">▼</span>
                        </div>
                        <div class="accordion-content">
                            <p style="font-weight:700; color:var(--accent); font-size:0.8rem; margin-bottom:10px;">${data.macros}</p>
                            <p style="font-size:0.7rem; text-transform:uppercase; font-weight:800; color:var(--text-muted);">Ingredients:</p>
                            <ul class="recipe-list">${ingredientItems}</ul>
                            <p style="font-size:0.7rem; text-transform:uppercase; font-weight:800; color:var(--text-muted); margin-top:4px;">Instructions:</p>
                            <ol class="recipe-steps">${stepItems}</ol>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleAccordion(headerElement) {
            const content = headerElement.nextElementSibling;
            const arrow = headerElement.querySelector('span:last-child');
            if (content.style.display === 'block') {
                content.style.display = 'none';
                arrow.textContent = '▼';
            } else {
                content.style.display = 'block';
                arrow.textContent = '▲';
            }
        }

        function saveSet() {
            const exercise = document.getElementById('exercise').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const reps = parseInt(document.getElementById('reps').value);
            if(!weight || !reps || !exercise) return alert("Parameters missing.");

            const timestamp = new Date().toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
            let currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            currentLogs.unshift({ exercise, weight, reps, timestamp });
            localStorage.setItem('workoutLogs', JSON.stringify(currentLogs));

            document.getElementById('weight').value = '';
            document.getElementById('reps').value = '';
            displayLogs(); populateChartFilter(); updateChartMetrics();
        }

        function displayLogs() {
            const historyContainer = document.getElementById('logHistory');
            let currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            if(currentLogs.length === 0) {
                historyContainer.innerHTML = `<p style="color:var(--text-muted); font-size:0.8rem; text-align:center;">No entries logged.</p>`;
                return;
            }
            historyContainer.innerHTML = currentLogs.map(item => `
                <div class="log-item">
                    <div class="log-info-block"><h4>${item.exercise}</h4><p>${item.timestamp}</p></div>
                    <div class="log-value-badge">${item.weight}kg × ${item.reps}</div>
                </div>
            `).join('');
        }

        function populateChartFilter() {
            const filterSelect = document.getElementById('chartFilter');
            const currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            const exercisesInLog = [...new Set(currentLogs.map(item => item.exercise))];
            if(exercisesInLog.length === 0) { filterSelect.innerHTML = `<option value="">No metrics found</option>`; return; }
            filterSelect.innerHTML = exercisesInLog.map(ex => `<option value="${ex}">${ex}</option>`).join('');
        }

        function buildPerformanceChart() {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            performanceChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#22d3ee', borderWidth: 2, tension: 0.1, fill: true, backgroundColor: 'rgba(34,211,238,0.01)' }] },
                options: { plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#1e1e2f' } }, y: { grid: { color: '#1e1e2f' } } } }
            });
        }

        function updateChartMetrics() {
            if(!performanceChart) return;
            const targetExercise = document.getElementById('chartFilter').value;
            let currentLogs = JSON.parse(localStorage.getItem('workoutLogs')) || [];
            let matches = currentLogs.filter(item => item.exercise === targetExercise).reverse();
            performanceChart.data.labels = matches.map(item => item.timestamp);
            performanceChart.data.datasets[0].data = matches.map(item => Math.round(item.weight * (1 + item.reps / 30)));
            performanceChart.update();
        }

        function clearHistory() { if(confirm("Clear storage?")) { localStorage.removeItem('workoutLogs'); displayLogs(); populateChartFilter(); updateChartMetrics(); } }

        window.onload = function() {
            setupMuscleMapListeners();
            renderExerciseDropdown(); displayLogs(); buildPerformanceChart(); populateChartFilter(); updateChartMetrics(); renderDayMenu();
        };
    </script>
</body>
</html>
